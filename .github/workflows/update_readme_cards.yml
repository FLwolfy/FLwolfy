name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=FLwolfy&bg_color=30,e432ef,4a00e0&title_color=ffffff&text_color=e0c3fc&icon_color=feb47b&show_icons=true&count_private=true&hide_title=true&hide=prs&theme=tokyonight&card_width=300
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=FLwolfy&bg_color=30,4a00e0,e96443&title_color=fff&layout=compact&theme=tokyonight&card_width=300&langs_count=4&hide=jupyter notebook,html
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
